          NoneSun,
          Vps,
          socks5,
          ♻️ 香港自动,
          ♻️ 日本自动,
          ♻️ 狮城自动,
          ♻️ 美国自动,
          ♻️ 台湾自动,
          ♻️ 自动选择,
          🇨🇳 中国节点,
          🇭🇰 香港节点,
          🇯🇵 日本节点,
          🇸🇬 狮城节点,
          🇺🇲 美国节点,
          🇹🇼 台湾节点,
          🌐 全部节点,
          直连,
        ],
    }
