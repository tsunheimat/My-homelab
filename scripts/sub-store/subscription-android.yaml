# 必读！！！
# 此版本没有做防泄露处理，如介意请使用另一个名字为configdns的版本
# 注意规则在满足自己需求情况下，尽量做到精简，不要过度复杂，以免影响性能。
# 跑裸核用户请自行去掉下方控制面板模块的注释。
# 机场订阅
proxy-providers:
  Airport1:
    url: "subscription_link"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连


proxies:
  - { name: 直连, type: direct }

# 全局配置
mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "+.push.apple.com"

# 入站
tun:
  enable: true
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false

# DNS模块
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true

  default-nameserver:
    - https://223.5.5.5/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

proxy-groups:
  - {
      name: 默认代理,
      type: select,
      proxies:
        [
          NoneSun,
          Vps,
          🇨🇳 中国节点,
          🇭🇰 香港节点,
          🇯🇵 日本节点,
          🇸🇬 狮城节点,
          🇺🇲 美国节点,
          🇹🇼 台湾节点,
          🌐 全部节点,
          socks5,
          直连,
        ],
    }

  - {
      name: AI,
      type: select,
      proxies:
        [
          NoneSun,
          Vps,
          🇯🇵 日本节点,
          🇸🇬 狮城节点,
          🇺🇲 美国节点,
          🇹🇼 台湾节点,
          🌐 全部节点,
          socks5
        ],
    }

  - { name: socks5, type: select, include-all: true, filter: "socks5"}
  - { name: 🌐 全部节点, type: select, include-all: true }
  - { name: NoneSun, type: select, include-all: true, filter: "NoneSun" }
  - { name: Vps, type: select, include-all: true, filter: "Vps" }
  - { name: Sagit, type: select, include-all: true, filter: "Sagit" }

  - {
      name: 🇭🇰 香港节点,
      type: select,
      include-all: true,
      filter: "^(?=.*(🇭🇰|香港))(?!.*(🇯🇵|日本|🇸🇬|新加坡|狮城|🇺🇸|🇺🇲|美国|中国)).*$",
    }
  - {
      name: 🇯🇵 日本节点,
      type: select,
      include-all: true,
      filter: "^(?=.*(🇯🇵|日本))(?!.*(🇭🇰|香港|🇸🇬|新加坡|狮城|🇺🇸|🇺🇲|美国|中国)).*$",
    }
  - {
      name: 🇸🇬 狮城节点,
      type: select,
      include-all: true,
      filter: "^(?=.*(🇸🇬|新加坡|狮城))(?!.*(🇭🇰|香港|🇯🇵|日本|🇺🇸|🇺🇲|美国|中国)).*$",
    }
  - {
      name: 🇺🇲 美国节点,
      type: select,
      include-all: true,
      filter: "^(?=.*(🇺🇸|🇺🇲|美国))(?!.*(🇭🇰|香港|🇯🇵|日本|🇸🇬|新加坡|狮城|中国)).*$",
    }
  - {
      name: 🇹🇼 台湾节点,
      type: select,
      include-all: true,
      filter: "^(?=.*(🇹🇼|台湾|TW))(?!.*(🇭🇰|香港|🇯🇵|日本|🇸🇬|新加坡|狮城|🇺🇸|🇺🇲|美国|中国)).*$",
    }

# 规则匹配
rules:
  - RULE-SET,private_ip,直连,no-resolve
  - DOMAIN-KEYWORD,tsunhei,DIRECT
  - RULE-SET,ai_client_rule,AI
  - RULE-SET,ai_android,AI
  - RULE-SET,claude_rule,AI
  - RULE-SET,openai_rule,AI
  - RULE-SET,ai_mac_rule,AI
  - MATCH,默认代理

# 规则集
## type：可选http/file/inline  behavior：可选domain/ipcidr/classical format：可选yaml/text/mrs
rule-anchor:
  ip: &ip { type: http, interval: 86400, behavior: ipcidr, format: mrs }
  domain: &domain { type: http, interval: 86400, behavior: domain, format: mrs }
  class:
    &class { type: http, interval: 86400, behavior: classical, format: text }
rule-providers:
  private_ip:
    {
      <<: *ip,
      url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/private.mrs",
    }

  ai_client_rule:
    type: http
    interval: 86400
    behavior: classical
    format: yaml
    url: "https://raw.githubusercontent.com/tsunheimat/My-homelab/refs/heads/main/scripts/sub-store/clash/ai_client/ai_cleint.yaml"

  ai_mac_rule:
    type: http
    interval: 86400
    behavior: classical
    format: yaml
    url: "https://raw.githubusercontent.com/tsunheimat/My-homelab/refs/heads/main/scripts/sub-store/clash/ai_client/ai_mac.yaml"

  ai_android:
    type: http
    interval: 86400
    behavior: classical
    format: yaml
    url: "https://raw.githubusercontent.com/tsunheimat/My-homelab/refs/heads/main/scripts/sub-store/clash/ai_client/ai_android.yaml"



  claude_rule:
    type: http
    interval: 86400
    behavior: classical
    format: yaml
    url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Claude/Claude.yaml"

  openai_rule:
    type: http
    interval: 86400
    behavior: classical
    format: yaml
    url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.yaml"